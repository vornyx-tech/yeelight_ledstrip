#  Yeelight Lightstrip (1S / Plus) ESP32-WROOM, analog RGB
#    Red   -> GPIO13
#    Green -> GPIO14
#    Blue  -> GPIO5
# Hold to dim, press once to toogle 
# changeble sleep timer in HA


substitutions:
  name: yeelight-strip
  friendly_name: "Yeelight Strip"
  red_pin: GPIO13
  green_pin: GPIO14
  blue_pin: GPIO5

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32doit-devkit-v1   # generic ESP32-WROOM-32 dev board profile
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: "y"

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "Yeelight Strip Setup"
    password: !secret ap_password

captive_portal:

output:
  - platform: ledc
    id: out_red
    pin: ${red_pin}
    frequency: 1000 Hz
  - platform: ledc
    id: out_green
    pin: ${green_pin}
    frequency: 1000 Hz
  - platform: ledc
    id: out_blue
    pin: ${blue_pin}
    frequency: 1000 Hz

light:
  - platform: rgb
    name: "Yeelight Strip"
    id: strip
    red: out_red
    green: out_green
    blue: out_blue
    restore_mode: RESTORE_DEFAULT_OFF
    default_transition_length: 0.8s
    effects:
      - pulse:
          name: "Slow pulse"
          transition_length: 2s
          update_interval: 2s
      - pulse:
          name: "Fast pulse"
          transition_length: 0.4s
          update_interval: 0.4s
      - strobe:
          name: "Strobe"
      - flicker:
          name: "Candle"
          alpha: 92%
          intensity: 12%
      - random:
          name: "Random colors"
          transition_length: 4s
          update_interval: 5s
      - lambda:
          name: "Rainbow cycle"
          update_interval: 80ms
          lambda: |-
            static float hue = 0.0f;
            hue += 0.01f;
            if (hue >= 1.0f) hue -= 1.0f;
            // simple HSV(hue,1,1) -> RGB
            float h = hue * 6.0f;
            int   i = (int)h;
            float f = h - i;
            float q = 1.0f - f;
            float r, g, b;
            switch (i % 6) {
              case 0: r = 1;  g = f;  b = 0;  break;
              case 1: r = q;  g = 1;  b = 0;  break;
              case 2: r = 0;  g = 1;  b = f;  break;
              case 3: r = 0;  g = q;  b = 1;  break;
              case 4: r = f;  g = 0;  b = 1;  break;
              default:r = 1;  g = 0;  b = q;  break;
            }
            auto call = id(strip).turn_on();
            call.set_transition_length(80);
            call.set_rgb(r, g, b);
            call.set_publish(false);
            call.set_save(false);
            call.perform();
globals:
  - id: dim_up
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: transition_ms
    type: uint32_t
    restore_value: yes
    initial_value: '800'

# ---- Physical button on the controller (GPIO19, active-low) ----
#   short press  -> toggle on/off
#   press & hold -> ramp brightness (alternates up/down each hold)
binary_sensor:
  - platform: gpio
    id: strip_button
    name: "Strip button"
    pin:
      number: GPIO19
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 20ms     # debounce
    on_click:
      max_length: 400ms
      then:
        - light.toggle: strip
    on_press:
      - delay: 450ms
      - if:
          condition:
            - binary_sensor.is_on: strip_button
          then:
            - light.turn_on: strip        
            - while:
                condition:
                  - binary_sensor.is_on: strip_button
                then:
                  - light.dim_relative:
                      id: strip
                      relative_brightness: !lambda 'return id(dim_up) ? 0.03 : -0.03;'
                      transition_length: 0s  
                  - delay: 45ms
            - lambda: 'id(dim_up) = !id(dim_up);' 

# Sleep timer
select:
  - platform: template
    name: "Sleep timer"
    id: sleep_select
    icon: mdi:timer-outline
    optimistic: true
    restore_value: false
    initial_option: "Off"
    options: ["Off", "30 min", "1 h", "1.5 h", "2 h", "3 h"]
    set_action:
      - if:
          condition:
            lambda: 'return x == "Off";'
          then:
            - script.stop: sleep_script
          else:
            - script.execute:
                id: sleep_script
                mins: !lambda |-
                  if (x == "30 min") return 30;
                  if (x == "1 h")    return 60;
                  if (x == "1.5 h")  return 90;
                  if (x == "2 h")    return 120;
                  if (x == "3 h")    return 180;
                  return 0;

# Fake temp slider
number:
  - platform: template
    name: "Color temperature"
    id: color_temp
    icon: mdi:thermometer
    unit_of_measurement: "K"
    optimistic: true
    restore_value: true
    min_value: 2000
    max_value: 6500
    step: 100
    initial_value: 4000
    mode: slider
    set_action:
      - lambda: |-
          float t = x / 100.0f;
          float r, g, b;
          if (t <= 66.0f) r = 255.0f;
          else            r = 329.698727f * powf(t - 60.0f, -0.1332048f);
          if (t <= 66.0f) g = 99.470802f * logf(t) - 161.119568f;
          else            g = 288.122170f * powf(t - 60.0f, -0.0755148f);
          if (t >= 66.0f)      b = 255.0f;
          else if (t <= 19.0f) b = 0.0f;
          else                 b = 138.517731f * logf(t - 10.0f) - 305.044793f;
          r = r < 0 ? 0 : (r > 255 ? 255 : r);
          g = g < 0 ? 0 : (g > 255 ? 255 : g);
          b = b < 0 ? 0 : (b > 255 ? 255 : b);
          auto call = id(strip).turn_on();
          call.set_rgb(r / 255.0f, g / 255.0f, b / 255.0f);
          call.set_transition_length(id(transition_ms));
          call.perform();

  - platform: template
    name: "Transition speed"
    id: transition_speed
    icon: mdi:transition
    unit_of_measurement: "ms"
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 3000
    step: 50
    initial_value: 800
    mode: slider
    set_action:
      - lambda: 'id(transition_ms) = (uint32_t) x;'

button:
  - platform: template
    name: "Warm white"
    icon: mdi:weather-sunset
    on_press:
      - number.set:
          id: color_temp
          value: 2700
  - platform: template
    name: "Cool white"
    icon: mdi:snowflake
    on_press:
      - number.set:
          id: color_temp
          value: 6000

script:
  - id: sleep_script
    mode: restart
    parameters:
      mins: int
    then:
      - delay: !lambda 'return (uint32_t) mins * 60000;'
      - light.turn_off: strip
      - select.set:
          id: sleep_select
          option: "Off"
